<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Reader | Clean View</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00c8ff;
            --card-bg: #161616;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Liste Görünümü */
        #fileListContainer {
            width: 90%;
            max-width: 600px;
            margin: 20px 0;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .zip-item {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }

        .zip-item:hover { border-color: var(--accent); background: #1d1d1d; }
        .zip-info { display: flex; align-items: center; gap: 12px; }
        .zip-icon { color: var(--accent); width: 24px; }

        /* Yükleme Alanı */
        .upload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            margin: 20px 0;
            width: 90%;
            max-width: 400px;
            border: 2px dashed #333;
            border-radius: 20px;
            background: var(--card-bg);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .upload-container:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 200, 255, 0.1); }
        .initial-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .upload-icon { width: 64px; height: 64px; margin-bottom: 15px; color: var(--accent); }
        .upload-container p { margin: 0; font-weight: 600; font-size: 1.1rem; }
        input[type="file"] { display: none; }

        /* Okuyucu */
        #viewer { width: 100%; max-width: 800px; display: flex; flex-direction: column; }
        #viewer img { width: 100%; height: auto; display: block; }

        /* Navigasyon Panelleri (Üst ve Alt) */
        .nav-wrapper {
            display: none; /* Başta gizli */
            width: 100%;
            max-width: 800px;
            padding: 20px 0;
            justify-content: space-around;
            align-items: center;
            background: #000;
        }

        .nav-btn {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: #000; }
        .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        #loader {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            border: 3px solid #222;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 2000;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"></div>

    <label id="mainPicker" class="upload-container initial-center">
        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
        </svg>
        <p>BÖLÜMLERİ SEÇ</p>
        <input type="file" id="initialInput" class="zipInput" accept=".zip" multiple>
    </label>

    <div id="fileListContainer"></div>

    <div id="topNav" class="nav-wrapper">
        <button class="nav-btn prevBtn">⬅ Önceki</button>
        <button class="nav-btn listBtn">☰ Liste</button>
        <button class="nav-btn nextBtn">Sonraki ➡</button>
    </div>

    <div id="viewer"></div>

    <div id="bottomNav" class="nav-wrapper" style="margin-bottom: 50px; border-top: 1px solid #222;">
        <button class="nav-btn prevBtn">⬅ Önceki</button>
        <button class="nav-btn listBtn">☰ Liste</button>
        <button class="nav-btn nextBtn">Sonraki ➡</button>
    </div>

    <input type="file" id="addMoreInput" class="zipInput" accept=".zip" multiple>

<script>
    const viewer = document.getElementById('viewer');
    const mainPicker = document.getElementById('mainPicker');
    const fileListContainer = document.getElementById('fileListContainer');
    const navWrappers = document.querySelectorAll('.nav-wrapper');
    const loader = document.getElementById('loader');
    
    let selectedFiles = [];
    let currentIndex = -1;

    // Dosya Seçme ve Sıralama
    document.querySelectorAll('.zipInput').forEach(input => {
        input.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const newFiles = Array.from(e.target.files);
                selectedFiles.push(...newFiles);
                selectedFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));
                renderFileList();
            }
        });
    });

    function renderFileList() {
        viewer.innerHTML = '';
        viewer.style.display = 'none';
        navWrappers.forEach(nav => nav.style.display = 'none');
        mainPicker.style.display = 'none';
        mainPicker.classList.remove('initial-center');
        
        fileListContainer.innerHTML = '<h3 style="text-align:center; color:var(--accent)">Bölüm Listesi</h3>';
        fileListContainer.style.display = 'flex';

        selectedFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'zip-item';
            item.innerHTML = `
                <div class="zip-info">
                    <svg class="zip-icon" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm0 2h12v10H4V5z"></path></svg>
                    <span>${file.name}</span>
                </div>
            `;
            item.onclick = () => { currentIndex = index; loadZip(file); };
            fileListContainer.appendChild(item);
        });

        const addMore = document.createElement('div');
        addMore.className = 'zip-item';
        addMore.style.borderStyle = 'dashed';
        addMore.innerHTML = '<div class="zip-info"><span>+ Yeni Bölümler Ekle</span></div>';
        addMore.onclick = () => document.getElementById('addMoreInput').click();
        fileListContainer.appendChild(addMore);
    }

    async function loadZip(file) {
        if (!file) return;
        loader.style.display = "block";
        fileListContainer.style.display = 'none';
        viewer.innerHTML = '';
        viewer.style.display = 'flex';
        navWrappers.forEach(nav => nav.style.display = 'flex');

        // Buton durumlarını her iki panel için güncelle
        document.querySelectorAll('.prevBtn').forEach(btn => btn.disabled = currentIndex <= 0);
        document.querySelectorAll('.nextBtn').forEach(btn => btn.disabled = currentIndex >= selectedFiles.length - 1);

        try {
            const jszip = new JSZip();
            const zip = await jszip.loadAsync(file);
            
            let images = Object.keys(zip.files).filter(name => 
                name.match(/\.(jpg|jpeg|png|webp|gif|avif)$/i) && !zip.files[name].dir
            );

            images.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));

            for (let imgName of images) {
                const imgData = await zip.files[imgName].async("blob");
                const imgUrl = URL.createObjectURL(imgData);
                const img = document.createElement('img');
                img.src = imgUrl;
                img.loading = "lazy";
                viewer.appendChild(img);
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (err) {
            alert("Hata: Bölüm açılamadı.");
            renderFileList();
        } finally {
            loader.style.display = "none";
        }
    }

    // Navigasyon Olayları (Tüm buton setleri için)
    document.querySelectorAll('.prevBtn').forEach(btn => {
        btn.onclick = () => {
            if (currentIndex > 0) {
                currentIndex--;
                loadZip(selectedFiles[currentIndex]);
            }
        };
    });

    document.querySelectorAll('.nextBtn').forEach(btn => {
        btn.onclick = () => {
            if (currentIndex < selectedFiles.length - 1) {
                currentIndex++;
                loadZip(selectedFiles[currentIndex]);
            }
        };
    });

    document.querySelectorAll('.listBtn').forEach(btn => {
        btn.onclick = () => renderFileList();
    });
</script>

</body>
</html>
