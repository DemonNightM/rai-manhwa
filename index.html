<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Reader | Minimal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00c8ff;
            --card-bg: #161616;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Ortalanmış Yükleme Alanı */
        .upload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            margin: 20px 0;
            width: 90%;
            max-width: 400px;
            border: 2px dashed #333;
            border-radius: 20px;
            background: var(--card-bg);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .upload-container:hover {
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.1);
        }

        /* İlk açılıştaki tam ortalama */
        .initial-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .upload-container p {
            margin: 0;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .upload-container span {
            font-size: 0.8rem;
            color: #666;
            margin-top: 8px;
        }

        input[type="file"] {
            display: none;
        }

        /* Resim Alanı */
        #viewer {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
        }

        #viewer img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Alt Seçici (Resimler varken görünür) */
        #bottomPicker {
            display: none;
            margin-top: 40px;
            margin-bottom: 60px;
        }

        /* Loading Spinner */
        #loader {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            border: 3px solid #222;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .upload-container { width: 80%; }
        }
    </style>
</head>
<body>

    <div id="loader"></div>

    <label id="mainPicker" class="upload-container initial-center">
        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path>
        </svg>
        <p>ZIP SEÇ</p>
        <span>Manhwa okumaya başla</span>
        <input type="file" class="zipInput" accept=".zip">
    </label>

    <div id="viewer"></div>

    <label id="bottomPicker" class="upload-container">
        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path>
        </svg>
        <p>YENİ ZIP SEÇ</p>
        <span>Başka bir bölüme geç</span>
        <input type="file" class="zipInput" accept=".zip">
    </label>

<script>
    const viewer = document.getElementById('viewer');
    const mainPicker = document.getElementById('mainPicker');
    const bottomPicker = document.getElementById('bottomPicker');
    const loader = document.getElementById('loader');

    // Her iki input için de aynı fonksiyonu kullanıyoruz
    document.querySelectorAll('.zipInput').forEach(input => {
        input.addEventListener('change', handleFile);
    });

    async function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Arayüz düzenlemesi
        loader.style.display = "block";
        viewer.innerHTML = '';
        
        // İlk yüklemeden sonra ana butonu merkeze almayı bırak, yukarı taşı
        mainPicker.classList.remove('initial-center');
        mainPicker.style.display = 'none'; // Üsttekini tamamen gizle (isteğe bağlı)
        bottomPicker.style.display = 'none';

        try {
            const jszip = new JSZip();
            const zip = await jszip.loadAsync(file);
            
            let fileList = Object.keys(zip.files).filter(name => 
                name.match(/\.(jpg|jpeg|png|webp|gif|avif)$/i) && !zip.files[name].dir
            );

            // Doğal sıralama
            fileList.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));

            for (let fileName of fileList) {
                const imgData = await zip.files[fileName].async("blob");
                const imgUrl = URL.createObjectURL(imgData);
                
                const img = document.createElement('img');
                img.src = imgUrl;
                img.loading = "lazy";
                viewer.appendChild(img);
            }

            // İşlem bitince alt seçiciyi göster ve yukarı kaydır
            bottomPicker.style.display = 'flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (err) {
            alert("Hata: Dosya işlenemedi.");
            mainPicker.style.display = 'flex';
            mainPicker.classList.add('initial-center');
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
